{% extends "base.html" %}

{% block title %}Edit {{ member.name }} — JuntosHQ{% endblock %}

{% block content %}
<h1>Edit Member</h1>
<form method="post" action="{{ url_for('members.edit', junto_id=junto.id, id=member.id) }}">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{ member.name }}" required>
    </div>
    <div class="form-group">
        <label for="role">Role</label>
        <input type="text" id="role" name="role" value="{{ member.role or '' }}">
    </div>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ member.email or '' }}" placeholder="member@example.com">
    </div>
    <div class="form-group">
        <label for="occupation">Occupation</label>
        <input type="text" id="occupation" name="occupation" value="{{ member.occupation or '' }}">
    </div>
    <div class="form-group">
        <label for="bio">Bio</label>
        <textarea id="bio" name="bio" rows="3">{{ member.bio or '' }}</textarea>
    </div>
    <div class="form-actions">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-secondary" href="{{ url_for('juntos.show', id=junto.id) }}">Cancel</a>
    </div>
</form>

{% if not member.user_id %}
<hr>
<h2>Invite Member</h2>
<form method="post" action="{{ url_for('invites.create', junto_id=junto.id) }}" class="invite-form">
    <input type="hidden" name="member_id" value="{{ member.id }}">
    <div class="form-group">
        <label for="email">Email (optional)</label>
        <input type="email" id="email" name="email" placeholder="member@example.com" class="invite-email-input">
    </div>
    <div class="form-actions">
        <button class="btn btn-invite" type="submit">Send Invite</button>
    </div>
</form>
{% endif %}

<hr>
<h2>Danger Zone</h2>
<form method="post" action="{{ url_for('members.delete', junto_id=junto.id, id=member.id) }}">
    <button class="btn btn-danger" type="submit">Delete Member</button>
</form>
{% endblock %}
