{% extends "base.html" %}

{% block title %}New Member — JuntosHQ{% endblock %}

{% block content %}
<h1>Add Member to {{ junto.name }}</h1>
<form method="post" action="{{ url_for('members.create', junto_id=junto.id) }}">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
    </div>
    <div class="form-group">
        <label for="role">Role</label>
        <input type="text" id="role" name="role">
    </div>
    <div class="form-actions">
        <button class="btn btn-primary" type="submit">Add</button>
        <a class="btn btn-secondary" href="{{ url_for('juntos.show', id=junto.id) }}">Cancel</a>
    </div>
</form>
{% endblock %}
