{% extends "base.html" %}

{% block content %}
<h1>Juntos</h1>
<p><a href="{{ url_for('juntos.new') }}">Create Junto</a></p>
{% if juntos %}
<ul>
    {% for junto in juntos %}
    <li><a href="{{ url_for('juntos.show', id=junto.id) }}">{{ junto.name }}</a> &mdash; {{ junto.description }}</li>
    {% endfor %}
</ul>
{% else %}
<p>No juntos yet. Create one to get started.</p>
{% endif %}
{% endblock %}
