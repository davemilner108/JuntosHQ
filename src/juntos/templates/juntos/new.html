{% extends "base.html" %}

{% block title %}New Junto — JuntosHQ{% endblock %}

{% block content %}
<h1>New Junto</h1>
<form method="post" action="{{ url_for('juntos.create') }}">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description"></textarea>
    </div>
    <div class="form-group">
        <label for="meeting_url">Meeting Link</label>
        <input type="url" id="meeting_url" name="meeting_url" placeholder="https://zoom.us/j/...">
    </div>
    <div class="form-actions">
        <button class="btn btn-primary" type="submit">Create</button>
        <a class="btn btn-secondary" href="{{ url_for('main.index') }}">Cancel</a>
    </div>
</form>
{% endblock %}
