{% extends "base.html" %}

{% block title %}Edit {{ junto.name }} — JuntosHQ{% endblock %}

{% block content %}
<h1>Edit Junto</h1>
<form method="post" action="{{ url_for('juntos.edit', id=junto.id) }}">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{ junto.name }}" required>
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description">{{ junto.description or '' }}</textarea>
    </div>
    <div class="form-group">
        <label for="meeting_url">Meeting Link</label>
        <input type="url" id="meeting_url" name="meeting_url" value="{{ junto.meeting_url or '' }}" placeholder="https://zoom.us/j/...">
    </div>
    <div class="form-actions">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-secondary" href="{{ url_for('juntos.show', id=junto.id) }}">Cancel</a>
    </div>
</form>
{% endblock %}
