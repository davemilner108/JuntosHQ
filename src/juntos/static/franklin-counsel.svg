  <path d="M65 50 Q70 30 85 38" fill="none" stroke="#8a7560" stroke-width="2" stroke-linecap="round"/>
  <path d="M135 50 Q130 30 115 38" fill="none" stroke="#8a7560" stroke-width="2" stroke-linecap="round"/>
  <path d="M80 42 Q90 25 100 35" fill="none" stroke="#8a7560" stroke-width="2" stroke-linecap="round"/>
