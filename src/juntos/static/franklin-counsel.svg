  <circle cx="170" cy="50" r="2" fill="#c9a84c" opacity="0.7"/>
  <circle cx="180" cy="38" r="1.5" fill="#c9a84c" opacity="0.5"/>
  <circle cx="165" cy="32" r="1.5" fill="#c9a84c" opacity="0.6"/>
